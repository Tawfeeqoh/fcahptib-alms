<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — ALMS · FCAH&PT Ibadan</title>
    <meta name="description" content="Sign in to your ALMS account — Federal College of Animal Health & Production Technology, Ibadan">
    <meta name="csrf-token" content="">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/png" href="/assets/img/logo.png">
    <link rel="stylesheet" href="/assets/css/globals.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <script src="/assets/js/auth-guard.js" data-role="guest"></script>
    <style>
        body {
            background: var(--clr-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--sp-4);
        }
        .signin-card {
            width: 100%;
            max-width: 440px;
            background: var(--clr-surface);
            border: 1px solid var(--clr-border-light);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-md);
            padding: var(--sp-6);
            position: relative;
            z-index: 1;
        }
        @media (min-width: 480px) {
            .signin-card { padding: var(--sp-8); }
        }
        .signin-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--clr-text);
            text-decoration: none;
            margin-bottom: var(--sp-6);
            justify-content: center;
        }
        .signin-logo-box {
            background: var(--clr-primary);
            color: #fff;
            padding: 5px 11px;
            border-radius: 8px;
            font-size: 1rem;
        }
        #synapse-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.35;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: var(--sp-5) 0;
            color: var(--clr-text-muted);
            font-size: 0.75rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--clr-border-light);
        }
    </style>
</head>
<body class="film-grain">
    <canvas id="synapse-canvas"></canvas>

    <div class="signin-card animate-fade-in-up">
        <!-- Logo -->
        <a href="/index.html" class="signin-logo">
            <img src="/assets/img/logo.png" alt="ALMS Logo" style="height:48px; object-fit:contain;">
            FCAH&amp;PT Ibadan
        </a>

        <!-- Heading -->
        <div style="text-align:center;margin-bottom:var(--sp-6);">
            <h1 class="hero-text-cinematic" style="font-size:1.5rem;margin-bottom:4px;">Welcome Back</h1>
            <p class="text-secondary" style="font-size:0.875rem;">Sign in to your academic command center</p>
        </div>

        <!-- Flash messages -->
        <div id="flash-container"></div>

        <!-- Login Form -->
        <form id="login-form" novalidate>
            <div style="display:flex;flex-direction:column;gap:var(--sp-4);">
                <div class="input-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" name="email" required
                        placeholder="your.name@example.com"
                        class="input-field" autocomplete="email">
                </div>

                <div class="input-group">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--sp-1);">
                        <label for="login-password" style="margin-bottom:0;">Password</label>
                        <a href="/forgot-password.html" style="font-size:0.8125rem;color:var(--clr-primary);font-weight:600;text-decoration:none;">Forgot?</a>
                    </div>
                    <div class="input-password-wrap">
                        <input type="password" id="login-password" name="password" required
                            class="input-field" autocomplete="current-password">
                        <button type="button" class="toggle-pw" aria-label="Toggle Password Visibility">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div style="display:flex;align-items:center;gap:8px;">
                    <input type="checkbox" id="login-remember" name="remember"
                        style="accent-color:var(--clr-primary);width:16px;height:16px;cursor:pointer;">
                    <label for="login-remember" style="font-size:0.875rem;color:var(--clr-text-secondary);cursor:pointer;user-select:none;">
                        Remember me for 30 days
                    </label>
                </div>

                <button type="submit" id="login-submit" class="btn btn-primary btn-full" style="margin-top:var(--sp-1);">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    Sign In
                </button>
            </div>
        </form>

        <div class="divider">or</div>

        <div style="text-align:center;font-size:0.875rem;color:var(--clr-text-secondary);">
            Don't have an account?
            <a href="/register.html" style="color:var(--clr-primary);font-weight:700;margin-left:4px;">Register here</a>
        </div>

        <!-- Footer links -->
        <div style="margin-top:var(--sp-6);padding-top:var(--sp-4);border-top:1px solid var(--clr-border-light);text-align:center;">
            <p style="font-size:0.75rem;color:var(--clr-text-muted);margin-bottom:var(--sp-2);">
                Questions? <a href="mailto:support@fcahptib.edu.ng" style="color:var(--clr-primary);">support@fcahptib.edu.ng</a>
            </p>
            <a href="/admin/login.html"
               style="font-size:0.6875rem;font-family:var(--font-mono);color:var(--clr-text-muted);text-transform:uppercase;letter-spacing:0.06em;text-decoration:none;font-weight:600;"
               onmouseover="this.style.color='var(--clr-primary)'"
               onmouseout="this.style.color='var(--clr-text-muted)'">
                Administrator Support
            </a>
        </div>
    </div>

    <script src="/assets/js/main.js"></script>
    <script>
    // ── Flash messages from URL params ──
    (function() {
        const params = new URLSearchParams(window.location.search);
        const errorKey = params.get('error');
        const msgKey   = params.get('msg');
        const errors = {
            missing_fields:      'Please fill in all required fields.',
            invalid_email:       'Please enter a valid email address.',
            invalid_credentials: 'Email or password is incorrect.',
            account_locked:      'Account locked. Try again in 15 minutes.',
            pending_approval:    'Your account is awaiting admin approval.',
            account_suspended:   'Your account has been suspended. Contact administrator.',
            session_expired:     'Your session has expired. Please log in again.',
            forbidden:           'Access denied.',
            csrf_failed:         'Security token failed. Please refresh and try again.',
        };
        const successes = {
            logged_out:         'You have been signed out successfully.',
            registered:         'Registration complete! An admin will review and approve your lecturer account shortly.',
            registered_student: 'Registration complete! You can now sign in.',
            password_reset:     'Password reset successful. You can now sign in with your new password.',
        };
        const c = document.getElementById('flash-container');
        if (errorKey && errors[errorKey]) {
            c.innerHTML = `<div class="flash-msg error" style="margin-bottom:var(--sp-4);"><i class="fa-solid fa-triangle-exclamation"></i><span>${errors[errorKey]}</span></div>`;
        }
        if (msgKey && successes[msgKey]) {
            c.innerHTML = `<div class="flash-msg success" style="margin-bottom:var(--sp-4);"><i class="fa-solid fa-circle-check"></i><span>${successes[msgKey]}</span></div>`;
        }
    })();

    // ── CSRF ──
    let csrfToken = '';
    fetch('/api/session.php', { credentials: 'include' })
        .then(r => r.json())
        .then(d => { csrfToken = d.csrf_token || ''; document.querySelector('meta[name="csrf-token"]').content = csrfToken; })
        .catch(() => {});

    // ── Login form ──
    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn   = document.getElementById('login-submit');
        const flash = document.getElementById('flash-container');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';

        try {
            const res  = await fetch('/api/auth.php', {
                method:  'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({
                    action:     'login',
                    email:      document.getElementById('login-email').value.trim(),
                    password:   document.getElementById('login-password').value,
                    csrf_token: csrfToken,
                    remember:   document.getElementById('login-remember').checked ? 1 : 0,
                }),
            });
            const data = await res.json();
            if (data.success) {
                const role = data.role || data.user?.role;
                if (role === 'admin')    { window.location.href = '/admin/dashboard.html'; return; }
                if (role === 'lecturer') { window.location.href = '/lecturer/dashboard.html'; return; }
                window.location.href = '/student/dashboard.html';
            } else {
                const msgs = {
                    invalid_credentials: 'Email or password is incorrect.',
                    account_locked:      'Account locked. Try again in 15 minutes.',
                    pending_approval:    'Your account is awaiting admin approval.',
                    account_suspended:   'Your account has been suspended.',
                    csrf_failed:         'Security token failed. Refresh and try again.',
                };
                flash.innerHTML = `<div class="flash-msg error" style="margin-bottom:var(--sp-4);"><i class="fa-solid fa-triangle-exclamation"></i><span>${msgs[data.error] || data.message || 'Login failed.'}</span></div>`;
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
            }
        } catch(err) {
            flash.innerHTML = `<div class="flash-msg error" style="margin-bottom:var(--sp-4);"><i class="fa-solid fa-wifi"></i><span>Network error. Please check your connection.</span></div>`;
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
        }
    });

    // ── Synapse canvas ──
    (function() {
        const canvas = document.getElementById('synapse-canvas');
        const ctx    = canvas.getContext('2d');
        const N      = window.innerWidth < 480 ? 20 : 40;
        const MAX_D  = 110;
        let nodes    = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        for (let i = 0; i < N; i++) {
            nodes.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5, r: Math.random()*1.8+1 });
        }
        function tick() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            nodes.forEach(n => {
                n.x += n.vx; n.y += n.vy;
                if (n.x < 0 || n.x > canvas.width)  n.vx *= -1;
                if (n.y < 0 || n.y > canvas.height)  n.vy *= -1;
                ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(209,0,0,0.35)'; ctx.fill();
            });
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i+1; j < nodes.length; j++) {
                    const dx = nodes[i].x-nodes[j].x, dy = nodes[i].y-nodes[j].y;
                    const d  = Math.sqrt(dx*dx+dy*dy);
                    if (d < MAX_D) {
                        ctx.beginPath(); ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y);
                        ctx.strokeStyle = `rgba(209,0,0,${(1-d/MAX_D)*0.18})`; ctx.lineWidth=0.7; ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(tick);
        }
        tick();
    })();
    </script>
</body>
</html>
